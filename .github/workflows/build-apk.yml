name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Release Keystore
        run: |
          keytool -genkey -v -keystore release.jks \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=DeepSeekWidget, OU=Personal, O=Tiramisu, L=Qingdao, ST=Shandong, C=CN"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK (Release) with signing
        run: |
          echo "storePassword=android" >> app/keystore.properties
          echo "keyPassword=android" >> app/keystore.properties
          echo "keyAlias=release" >> app/keystore.properties
          echo "storeFile=release.jks" >> app/keystore.properties
          ./gradlew assembleRelease

      - name: Verify APK
        run: |
          ls -lh app/build/outputs/apk/release/
          echo ""
          echo "=== APK signature info ==="
          jarsigner -verify -certs app/build/outputs/apk/release/*.apk 2>&1 | head -10

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: deepseek-widget-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
